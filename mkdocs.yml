site_name: swag2mcp
site_description: Bridging OpenAPI/Swagger/Postman specifications with LLM agents via MCP
site_url: https://mmadfox.github.io/swag2mcp
repo_url: https://github.com/mmadfox/swag2mcp
repo_name: mmadfox/swag2mcp
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/docs/logo.svg
  favicon: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/docs/logo.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: sky
      accent: violet
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: sky
      accent: violet
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
        - locale: de
          name: Deutsch
          build: true
        - locale: fr
          name: Français
          build: true
        - locale: es
          name: Español
          build: true
        - locale: zh
          name: 中文
          build: true
        - locale: ja
          name: 日本語
          build: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 1-4
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mmadfox/swag2mcp
    - icon: fontawesome/brands/golang
      link: https://go.dev
  generator: false
  alternate:
    - link: /
      name: English
      lang: en
    - link: /ru/
      name: Русский
      lang: ru
    - link: /de/
      name: Deutsch
      lang: de
    - link: /fr/
      name: Français
      lang: fr
    - link: /es/
      name: Español
      lang: es
    - link: /zh/
      name: 中文
      lang: zh
    - link: /ja/
      name: 日本語
      lang: ja

copyright: Copyright &copy; 2026 mmadfox

