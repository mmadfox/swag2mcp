name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Unit Tests
        run: go test -count=1 $(go list ./... | grep -v /tests/) -coverprofile=coverage.out -covermode=atomic

      # Coveralls in informational mode — never blocks PRs on coverage drop
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          fail-on-error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Integration Tests
        run: make integration-tests
