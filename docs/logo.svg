      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
