openapi: 3.1.1
info:
  title: OpenAPI 3.1.1 Example
  version: 1.0.0
  summary: Latest OpenAPI version
  description: Самые свежие уточнения спецификации
servers:
  - url: https://api.example.com/v1
webhooks:
  orderCreated:
    post:
      summary: Новый заказ
      responses:
        '200':
          description: OK
paths:
  /orders:
    get:
      summary: Список заказов
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
            application/xml:   
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        items:
          type: array
          prefixItems:          
            - type: string
            - type: integer
          items: false
        metadata:
          type: object
          propertyNames:
            pattern: '^[a-z]+$'