openapi: 3.0.1
info:
  title: OpenAPI 3.0.1 Example
  version: 1.0.0
  description: Bugfix-релиз с уточнениями nullable
servers:
  - url: https://api.example.com/v1
paths:
  /users/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          links:                
            GetUserPosts:
              operationId: getUserPosts
              parameters:
                userId: '$response.body#/id'
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true        