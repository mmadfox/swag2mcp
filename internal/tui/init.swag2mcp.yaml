# swag2mcp — configuration
# Ready-to-use specs from the repository.
# Uncomment or modify as needed.
disable_ratelimiter: true

http_client:
  headers:
    Accept: application/json

mcp:
  transport: stdio

specs:
  - domain: meteo
    llm_title: Open-Meteo Weather API
    llm_instruction: |
      Use the Open-Meteo API to get weather forecasts, air quality, marine,
      climate, flood, elevation, and historical weather data. Most endpoints
      require latitude and longitude. Help the user build the right query.
    base_url: https://api.open-meteo.com
    collections:
      - llm_title: Forecast
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/forecast.yml
      - llm_title: Air Quality
        base_url: https://air-quality-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/air-quality.yml
      - llm_title: Marine
        base_url: https://marine-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/marine.yml
      - llm_title: Climate
        base_url: https://climate-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/climate.yml
      - llm_title: Historical Weather
        base_url: https://archive-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/historical-weather.yml
      - llm_title: Ensemble
        base_url: https://ensemble-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/ensemble.yml
      - llm_title: Seasonal
        base_url: https://seasonal-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/seasonal.yml
      - llm_title: Flood
        base_url: https://flood-api.open-meteo.com
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/flood.yml
      - llm_title: Elevation
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo/elevation.yml

  - domain: rick-and-morty
    llm_title: Rick and Morty API
    llm_instruction: |
      Use the Rick and Morty API to look up characters, locations, and
      episodes from the show. Help the user paginate results and filter by
      name, status, species, etc.
    base_url: https://rickandmortyapi.com/api
    collections:
      - llm_title: Rick and Morty Collection
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/rick-and-morty.json

  - domain: binance
    llm_title: Binance Spot API
    llm_instruction: |
      Use the Binance Spot API to get market data, exchange info, order books,
      recent trades, and klines. This is read-only public market data.
    base_url: https://api.binance.com
    collections:
      - llm_title: Spot Market Data
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/binance.yaml

  - domain: dadjoke
    llm_title: icanhazdadjoke API
    llm_instruction: |
      Use this API to fetch random dad jokes. Great for lightening the mood.
    base_url: https://icanhazdadjoke.com
    collections:
      - llm_title: Dad Jokes
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/dadjoke.yaml

  - domain: pokeapi
    llm_title: PokéAPI
    llm_instruction: |
      Use PokéAPI to look up Pokémon, abilities, types, moves, and other
      game data. Help the user navigate by name or id.
    base_url: https://pokeapi.co
    collections:
      - llm_title: Pokémon Data
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/pokeapi.yaml
