openapi: "3.0.0"
info:
  title: Products API
  version: "1.0.0"
paths:
  /products:
    get:
      operationId: listProducts
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of products
  /products/{productId}:
    get:
      operationId: getProduct
      summary: Get a product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A product object
