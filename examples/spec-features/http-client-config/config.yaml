# swag2mcp — HTTP Client Configuration
http_client:
  headers:
    Accept: application/json
  timeout: 30s
  follow_redirects: true
  max_redirects: 5

specs:
  - domain: api-a
    base_url: https://api-a.example.com
    llm_title: API A
    http_client:
      timeout: 60s  # overrides global 30s
      headers:
        X-API-Key: $(API_A_KEY)
    collections:
      - llm_title: Main
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo.json

  - domain: api-b
    base_url: https://api-b.example.com
    llm_title: API B
    http_client:
      proxy:
        url: http://proxy.internal:8080
      cookies:
        - name: session_id
          value: $(SESSION_ID)
          domain: .example.com
          path: /
          secure: true
          http_only: true
    collections:
      - llm_title: Users
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo.json
      - llm_title: Billing
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/meteo.json
        http_client:
          headers:
            X-Billing-Version: "2024-q1"
