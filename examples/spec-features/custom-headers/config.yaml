# swag2mcp — Custom Headers
specs:
  - domain: multi-region-api
    base_url: https://api.example.com
    llm_title: Multi-Region API
    http_client:
      headers:
        X-Request-ID: req-001
        X-Source: swag2mcp
        X-API-Version: "2024-01"
    collections:
      - llm_title: US Region
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/petstore.json
        http_client:
          headers:
            X-Region: us-east-1
            X-Request-ID: us-req-001

      - llm_title: EU Region
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/petstore.json
        http_client:
          headers:
            X-Region: eu-west-1
            X-Request-ID: eu-req-001
