# swag2mcp — Collection Override
specs:
  - domain: saas-api
    base_url: https://api.saas.example.com
    llm_title: SaaS Platform API
    http_client:
      headers:
        X-Platform: saas-v2
    collections:
      - llm_title: Users
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/petstore.json

      - llm_title: Billing
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/petstore.json
        base_url: https://billing.saas.example.com
        http_client:
          headers:
            X-Billing-Version: "2024-q1"

      - llm_title: Legacy
        location: https://raw.githubusercontent.com/mmadfox/swag2mcp/main/specs/petstore.json
        disable: true
