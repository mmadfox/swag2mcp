openapi: 3.0.0
info:
  title: Binance Market Data API
  version: "1.0.0"
servers:
  - url: https://api.binance.com
tags:
  - name: market-data
paths:
  /api/v3/ticker/price:
    get:
      tags: [market-data]
      summary: Symbol price ticker
      operationId: getTickerPrice
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Price ticker data
  /api/v3/ticker/24hr:
    get:
      tags: [market-data]
      summary: 24hr ticker statistics
      operationId: getTicker24hr
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 24hr ticker statistics
  /api/v3/exchangeInfo:
    get:
      tags: [market-data]
      summary: Exchange information
      operationId: getExchangeInfo
      responses:
        '200':
          description: Exchange information
  /api/v3/klines:
    get:
      tags: [market-data]
      summary: Kline/candlestick data
      operationId: getKlines
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M]
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
      responses:
        '200':
          description: Kline data
