openapi: 3.0.0
info:
  title: REST Countries API
  version: "3.1.0"
  description: Get information about countries via a RESTful API
servers:
  - url: https://restcountries.com
tags:
  - name: countries
    description: Country information endpoints
paths:
  /v3.1/all:
    get:
      tags: [countries]
      summary: Get all countries
      description: Returns a list of all countries with their information
      operationId: getAllCountries
      responses:
        '200':
          description: List of countries
          content:
            application/json:
              schema:
                type: array
  /v3.1/name/{name}:
    get:
      tags: [countries]
      summary: Search by country name
      description: Search for a country by its name
      operationId: getCountryByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Country name (e.g. France, Germany)
      responses:
        '200':
          description: Country information
          content:
            application/json:
              schema:
                type: array
  /v3.1/region/{region}:
    get:
      tags: [countries]
      summary: Search by region
      description: Get all countries in a specific region
      operationId: getCountriesByRegion
      parameters:
        - name: region
          in: path
          required: true
          schema:
            type: string
            enum: [Africa, Americas, Asia, Europe, Oceania]
          description: Region name
      responses:
        '200':
          description: List of countries in the region
          content:
            application/json:
              schema:
                type: array
