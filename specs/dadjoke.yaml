openapi: 3.0.0
info:
  title: icanhazdadjoke API
  version: "1.0.0"
  description: The largest selection of dad jokes on the internet
servers:
  - url: https://icanhazdadjoke.com
tags:
  - name: jokes
    description: Dad joke endpoints
paths:
  /:
    get:
      tags: [jokes]
      summary: Get a random dad joke
      description: Returns a random dad joke
      operationId: getRandomJoke
      responses:
        '200':
          description: A random dad joke
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  joke:
                    type: string
                  status:
                    type: integer
  /j/{id}:
    get:
      tags: [jokes]
      summary: Get a specific dad joke by ID
      description: Returns a specific dad joke by its ID
      operationId: getJokeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Joke ID
      responses:
        '200':
          description: A specific dad joke
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  joke:
                    type: string
                  status:
                    type: integer
  /search:
    get:
      tags: [jokes]
      summary: Search dad jokes
      description: Search for dad jokes by term
      operationId: searchJokes
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
          description: Search term
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Results per page
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_page:
                    type: integer
                  total_jokes:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        joke:
                          type: string
